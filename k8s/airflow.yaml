apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-dags-pvc
  namespace: fraud-detection
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: fraud-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      initContainers:
      - name: init-db
        image: apache/airflow:2.10.4
        command:
        - /bin/bash
        - -c
        - |
          echo "⏳ Waiting for PostgreSQL..."
          until nc -z postgres 5432; do
            sleep 2
          done
          echo "✅ PostgreSQL is ready"
          
          echo "📦 Initializing Airflow database..."
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@postgres:5432/airflow_db
          airflow db init
          
          echo "👤 Creating admin user..."
          airflow users create \
            --username admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com \
            --password admin 2>/dev/null || echo "⚠️ User already exists"
          
          echo "✅ Airflow initialization complete"
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
      containers:
      - name: webserver
        image: apache/airflow:2.10.4
        command: ["airflow", "webserver"]
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: postgresql+psycopg2://airflow_user:airflow_pass@postgres:5432/airflow_db
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
          value: "True"
        - name: MLFLOW_TRACKING_URI
          value: http://mlflow:5000
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      - name: scheduler
        image: apache/airflow:2.10.4
        command: ["airflow", "scheduler"]
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: postgresql+psycopg2://airflow_user:airflow_pass@postgres:5432/airflow_db
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: MLFLOW_TRACKING_URI
          value: http://mlflow:5000
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: fraud-detection
spec:
  selector:
    app: airflow
  ports:
  - port: 8080
    targetPort: 8080