apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api
  namespace: fraud-detection
  labels:
    app: fraud-detection-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: fraud-detection-api
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api-lb
  namespace: fraud-detection
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    name: http
  selector:
    app: fraud-detection-api