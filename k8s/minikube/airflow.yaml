apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-dags-pvc
  namespace: fraud-detection
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: fraud-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      securityContext:
        runAsUser: 50000
        fsGroup: 50000
      initContainers:
      - name: init-db
        image: apache/airflow:2.10.4
        command:
        - /bin/bash
        - -c
        - |
          echo "⏳ Waiting for PostgreSQL..."
          until nc -z postgres 5432; do
            sleep 2
          done
          echo "✅ PostgreSQL is ready"

          echo "📦 Initializing Airflow database..."
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@postgres:5432/airflow_db
          airflow db init

          echo "👤 Creating admin user..."
          airflow users create \
            --username admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@example.com \
            --password admin 2>/dev/null || echo "⚠️ User already exists"

          echo "✅ Airflow initialization complete"
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"

      - name: init-minio
        image: apache/airflow:2.10.4
        command:
        - /bin/bash
        - -c
        - |
          echo "⏳ Waiting for MinIO..."
          until nc -z minio 9000; do
            sleep 2
          done
          echo "✅ MinIO is ready"

          echo "📦 Installing boto3..."
          pip install boto3

          echo "🔧 Creating MinIO connection..."
          export AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@postgres:5432/airflow_db
          airflow connections add 'minio_default' \
            --conn-type 'aws' \
            --conn-login 'minio' \
            --conn-password 'minio123' \
            --conn-extra '{"endpoint_url": "http://minio:9000"}'

          echo "✅ MinIO initialization complete"
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"

      containers:
      - name: webserver
        image: apache/airflow:2.10.4
        command: ["airflow", "webserver"]
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: postgresql+psycopg2://airflow_user:airflow_pass@postgres:5432/airflow_db
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
          value: "True"
        - name: MLFLOW_TRACKING_URI
          value: http://mlflow:5000
        - name: AIRFLOW_CONN_MINIO_DEFAULT
          value: "aws://minio:minio123@?endpoint_url=http%3A%2F%2Fminio%3A9000"
        - name: AIRFLOW__WEBSERVER__CONFIG_FILE
          value: /opt/airflow/webserver_config.py
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: airflow-config
          mountPath: /opt/airflow/webserver_config.py
          subPath: webserver_config.py
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3

      - name: scheduler
        image: apache/airflow:2.10.4
        command: ["airflow", "scheduler"]
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: postgresql+psycopg2://airflow_user:airflow_pass@postgres:5432/airflow_db
        - name: AIRFLOW__CORE__EXECUTOR
          value: LocalExecutor
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: MLFLOW_TRACKING_URI
          value: http://mlflow:5000
        - name: AIRFLOW_CONN_MINIO_DEFAULT
          value: "aws://minio:minio123@?endpoint_url=http%3A%2F%2Fminio%3A9000"
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags

      volumes:
      - name: dags
        persistentVolumeClaim:
          claimName: airflow-dags-pvc
      - name: airflow-config
        configMap:
          name: airflow-webserver-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-webserver-config
  namespace: fraud-detection
data:
  webserver_config.py: |
    from airflow import configuration as conf
    import os
    CSRF_ENABLED = True
    AUTH_TYPE = 1
    AUTH_ROLE_ADMIN = 'Admin'
    AUTH_ROLE_PUBLIC = 'Public'
    APP_NAME = "Airflow"
    RATELIMIT_ENABLED = False
    DATA_DIR = '/opt/airflow'
    TEMP_DIR = '/tmp'

---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: fraud-detection
spec:
  selector:
    app: airflow
  ports:
  - port: 8080
    targetPort: 8080