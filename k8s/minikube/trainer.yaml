apiVersion: apps/v1
kind: Deployment
metadata:
  name: trainer
  namespace: fraud-detection
  labels:
    app: trainer
    service: model-trainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trainer
  template:
    metadata:
      labels:
        app: trainer
        service: model-trainer
    spec:
      containers:
      - name: trainer
        image: ghcr.io/o-albot/model-trainer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MLFLOW_TRACKING_URI
          value: http://mlflow:5000
        - name: MINIO_ENDPOINT
          value: http://minio:9000
        - name: MINIO_ACCESS_KEY
          value: minio
        - name: MINIO_SECRET_KEY
          value: minio123
        - name: BUCKET_NAME
          value: mlops-bucket
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: trainer
  namespace: fraud-detection
  labels:
    app: trainer
    service: model-trainer
spec:
  selector:
    app: trainer
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP